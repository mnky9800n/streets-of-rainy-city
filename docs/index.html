<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streets of Rainy City — ONLY ON RCADE</title>
<style>
  :root {
    --neon-orange: #ff6600;
    --neon-yellow: #ffcc00;
    --neon-red: #ff2200;
    --neon-blue: #00aaff;
    --dark-bg: #080808;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Impact, 'Arial Black', sans-serif;
  }

  /* ── VIDEO BACKGROUND ── */
  #bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    z-index: 0;
    object-fit: cover;
    opacity: 0.55;
    /* no filter — saves GPU compositing on weak hardware */
  }

  /* Dark gradient overlay on video + fire glow at bottom */
  #video-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.7) 0%,
        rgba(0,0,0,0.2) 30%,
        rgba(0,0,0,0.15) 50%,
        rgba(0,0,0,0.2) 65%,
        rgba(20,5,0,0.6) 85%,
        rgba(60,15,0,0.7) 95%,
        rgba(80,20,0,0.8) 100%
      );
  }

  /* ── SCANLINES ── */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 900;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    /* static scanlines — no animation, saves full-screen repaints */
  }


  /* ── CRT VIGNETTE ── */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 899;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 50%,
      rgba(0,0,0,0.5) 80%,
      rgba(0,0,0,0.85) 100%
    );
  }

  /* ── EMBER CANVAS ── */
  #ember-canvas {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* ── MAIN CONTENT ── */
  #page {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 3vh 4vw 2vh;
  }

  /* ══════════════════════════════
     TITLE SECTION
  ══════════════════════════════ */
  #title-section {
    width: 100%;
    text-align: center;
  }

  #title-eyebrow {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.55rem, 1.6vw, 0.9rem);
    letter-spacing: 0.3em;
    color: var(--neon-orange);
    text-transform: uppercase;
    animation: pulse-text 2s ease-in-out infinite;
    margin-bottom: 0.5vh;
  }

  #game-title {
    line-height: 0.85;
    position: relative;
  }

  #title-streets {
    display: block;
    position: relative;
    z-index: 1;
    font-size: clamp(3.5rem, 14vw, 8rem);
    color: #fff;
    text-shadow:
      0 0 20px rgba(255,102,0,0.9),
      4px 4px 0 #330000;
    animation: title-shake 6s ease-in-out infinite;
    letter-spacing: 0.05em;
  }

  #title-of {
    display: block;
    position: relative;
    z-index: 2;
    font-size: clamp(1rem, 3.5vw, 2rem);
    color: var(--neon-yellow);
    letter-spacing: 0.6em;
    text-shadow: 0 0 20px var(--neon-yellow);
  }

  #title-rainy {
    display: block;
    position: relative;
    z-index: 3;
    font-size: clamp(2.5rem, 10vw, 5.5rem);
    color: var(--neon-blue);
    text-shadow:
      0 0 20px var(--neon-blue),
      3px 3px 0 #001133;
    animation: neon-flicker-blue 4s ease-in-out infinite;
    letter-spacing: 0.08em;
  }

  #title-city {
    display: inline-block;
    position: relative;
    z-index: 4;
    font-size: clamp(4rem, 16vw, 9rem);
    color: var(--neon-orange);
    text-shadow:
      0 0 20px var(--neon-orange),
      5px 5px 0 #330d00;
    animation: neon-flicker-orange 7s ease-in-out infinite;
    letter-spacing: 0.05em;
    margin-top: -0.5vh;
    position: relative;
  }

  #title-dotcom {
    position: absolute;
    right: 0;
    bottom: 0.15em;
    transform: translateX(100%);
    font-family: Consolas, 'Courier New', monospace;
    font-size: clamp(1rem, 4vw, 2rem);
    color: var(--neon-orange);
    text-shadow:
      0 0 8px var(--neon-orange),
      0 0 20px rgba(255,80,0,0.6);
    letter-spacing: 0;
    margin-left: 0.1em;
  }

  /* ── FIRE DIVIDER ── */
  .fire-divider {
    width: 85%;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--neon-orange) 20%,
      var(--neon-yellow) 50%,
      var(--neon-orange) 80%,
      transparent 100%
    );
    box-shadow: 0 0 8px var(--neon-orange), 0 0 20px rgba(255,80,0,0.4);
    animation: fire-line-pulse 2s ease-in-out infinite;
  }

  /* ══════════════════════════════
     RCADE CENTER SECTION
  ══════════════════════════════ */
  #hero-section {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
    gap: 1.5vh;
  }

  #hero-glow {
    position: absolute;
    width: 60%;
    height: 90%;
    background: radial-gradient(ellipse at center bottom,
      rgba(255,80,0,0.3) 0%,
      rgba(255,150,0,0.1) 40%,
      transparent 70%
    );
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #only-on-rcade-text {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 3;
    font-family: 'Brush Script MT', 'Segoe Script', 'Comic Sans MS', cursive;
    font-size: clamp(2.5rem, 10vw, 5rem);
    color: #fff;
    letter-spacing: 0.04em;
    transform: rotate(-3deg);
    text-shadow:
      0 0 8px rgba(255,255,255,0.6),
      0 0 25px rgba(255,255,255,0.3),
      2px 2px 0 rgba(0,0,0,0.8),
      -1px -1px 0 rgba(0,0,0,0.5);
    text-align: center;
    padding-bottom: 2vh;
  }


  #rcade-img-center {
    position: relative;
    z-index: 2;
    max-height: 55vh;
    max-width: 70%;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(0,170,255,0.7));
    animation: rcade-entrance 1s 1.8s cubic-bezier(0.22, 1, 0.36, 1) both,
               cabinet-bob 5s 2.8s ease-in-out infinite;
  }


  /* ══════════════════════════════
     PIZZA TEXT — bottom
  ══════════════════════════════ */
  #pizza-text {
    position: relative;
    z-index: 2;
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: clamp(3rem, 12vw, 6rem);
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    width: 100%;
    text-shadow:
      3px 3px 0 rgba(0,0,0,0.9),
      0 0 10px rgba(255,255,255,0.3);
  }

  /* ══════════════════════════════
     KEYFRAMES
  ══════════════════════════════ */

  @keyframes title-shake {
    0%, 90%, 100% { transform: translateX(0); }
    92%  { transform: translateX(-3px) rotate(-0.5deg); }
    94%  { transform: translateX(3px) rotate(0.5deg); }
    96%  { transform: translateX(-2px); }
    98%  { transform: translateX(2px); }
  }

  @keyframes neon-flicker-blue {
    0%, 19%, 21%, 54%, 56%, 100% {
      text-shadow: 0 0 20px var(--neon-blue), 3px 3px 0 #001133;
    }
    20%, 55% { text-shadow: 3px 3px 0 #001133; }
  }

  @keyframes neon-flicker-orange {
    0%, 39%, 41%, 74%, 76%, 100% {
      text-shadow: 0 0 20px var(--neon-orange), 5px 5px 0 #330d00;
    }
    40%, 75% { text-shadow: 5px 5px 0 #330d00; }
  }

  @keyframes pulse-text {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.7; }
  }

  @keyframes pop-in {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes rcade-entrance {
    0%   { transform: translateY(30px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes cabinet-bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-5px) rotate(1deg); }
  }

  @keyframes fire-line-pulse {
    0%, 100% { opacity: 0.8; }
    50%      { opacity: 1; box-shadow: 0 0 14px var(--neon-orange), 0 0 35px rgba(255,80,0,0.7); }
  }

  @keyframes screen-shake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-4px, 2px); }
    20% { transform: translate(4px, -3px); }
    30% { transform: translate(-3px, 4px); }
    40% { transform: translate(3px, -2px); }
    50% { transform: translate(-2px, 1px); }
    60% { transform: translate(2px, -1px); }
    70% { transform: translate(-1px, 2px); }
    80% { transform: translate(1px, -1px); }
    90% { transform: translate(0, 1px); }
  }
</style>
</head>
<body>

<!-- Background video -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="assets/startvideo.mp4" type="video/mp4">
</video>
<div id="video-overlay"></div>

<!-- Effects -->
<canvas id="ember-canvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<!-- ── MAIN CONTENT ── -->
<div id="page">

  <!-- TITLE -->
  <section id="title-section">
    <div id="title-eyebrow">&#9658; NOW PLAYING AT THE RECURSE CENTER &#9658;</div>
    <div id="game-title">
      <span id="title-streets">STREETS</span>
      <span id="title-of">O F</span>
      <span id="title-rainy">RAINY</span>
      <span id="title-city">CITY<span id="title-dotcom">.com</span></span>
    </div>
  </section>

  <div class="fire-divider"></div>

  <!-- PIZZA TEXT -->
  <div id="pizza-text">your pizza is getting cold...</div>

  <section id="hero-section">
    <div id="hero-glow"></div>
    <img id="rcade-img-center" src="assets/rcade.png" alt="RCade arcade cabinet">
  </section>

  <!-- ONLY ON RCADE -->
  <div id="only-on-rcade-text">ONLY ON RCADE</div>

</div>


<script>
// ═══════════════════════════════════════════
//  EMBER / FIRE PARTICLES rising from bottom
// ═══════════════════════════════════════════
(function initEmbers() {
  const canvas = document.getElementById('ember-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const MAX = 80;
  // Pre-compute colors to avoid string allocation per frame
  const COLORS = [];
  for (let h = 5; h < 50; h += 3) {
    COLORS.push(`hsl(${h}, 100%, 65%)`);
  }

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function spawn() {
    const edge = Math.random() < 0.4;
    const x = edge
      ? (Math.random() < 0.5 ? Math.random() * canvas.width * 0.25 : canvas.width - Math.random() * canvas.width * 0.25)
      : Math.random() * canvas.width;
    particles.push({
      x,
      y:     canvas.height + Math.random() * 30,
      vx:    (Math.random() - 0.5) * 2,
      vy:    -(Math.random() * 3.5 + 0.8),
      life:  1.0,
      decay: Math.random() * 0.005 + 0.002,
      size:  Math.random() * 5 + 1.5,
      ci:    Math.floor(Math.random() * COLORS.length),
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    while (particles.length < MAX) spawn();

    // No shadowBlur — draw each particle twice (big soft + small bright)
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;

      if (p.life <= 0 || p.y < -10) {
        particles.splice(i, 1);
        continue;
      }

      const r = p.size * p.life;
      // Soft glow (larger, transparent)
      ctx.globalAlpha = p.life * 0.3;
      ctx.fillStyle = COLORS[p.ci];
      ctx.fillRect(p.x - r * 2, p.y - r * 2, r * 4, r * 4);
      // Bright core
      ctx.globalAlpha = p.life * 0.85;
      ctx.fillRect(p.x - r, p.y - r, r * 2, r * 2);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

// ═══════════════════════════════════════════
//  PERIODIC SCREEN SHAKE
// ═══════════════════════════════════════════
(function initShake() {
  const page = document.getElementById('page');

  function shake() {
    page.style.animation = 'screen-shake 0.5s ease-out';
    page.addEventListener('animationend', function handler() {
      page.style.animation = '';
      page.removeEventListener('animationend', handler);
    });
  }

  function scheduleShake() {
    const delay = 6000 + Math.random() * 8000;
    setTimeout(() => { shake(); scheduleShake(); }, delay);
  }
  scheduleShake();
})();

</script>
</body>
</html>
